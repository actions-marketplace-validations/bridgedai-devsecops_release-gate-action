name: example-release-gate-enterprise
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  demo:
    runs-on: ubuntu-latest
    environment: bridgedai-demo
    steps:
      - uses: bridgedai-devsecops/release-gate-action@v1.0.0
        with:
          decision: WARN
          score: '70'
          reason: demo
          mode: warn
          minimum-score: '0'
          fail-on-warn: 'false'
          output-summary: 'true'

