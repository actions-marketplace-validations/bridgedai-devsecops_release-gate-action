name: example-release-gate-basic
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: bridgedai-devsecops/release-gate-action@v1.0.0
        with:
          decision: ALLOW
          score: '100'
          reason: demo
          mode: observe
          minimum-score: '0'
          fail-on-warn: 'false'
          output-summary: 'true'

